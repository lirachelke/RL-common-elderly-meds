<style>
body{font-family:system-ui,sans-serif;max-width:960px;margin:2rem auto;padding:0 1rem;background:#fff;color:#111}
h1{font-size:18px;font-weight:500;margin-bottom:1.5rem}
.ch{display:flex;align-items:center;gap:10px;margin:1.5rem 0 0.75rem;cursor:pointer;user-select:none;padding-bottom:6px;border-bottom:1px solid #eee}
.badge{font-size:13px;font-weight:500;padding:2px 10px;border-radius:6px}
.cnt{font-size:12px;color:#888;margin-left:4px}
.arr{font-size:11px;color:#aaa;margin-left:auto;transition:transform 0.2s}
.arr.open{transform:rotate(90deg)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px;margin-bottom:0.5rem}

/* flip card container */
.card{perspective:900px;cursor:pointer;min-height:130px}
.card.hidden{display:none}
.card-inner{position:relative;width:100%;height:100%;min-height:130px;transform-style:preserve-3d;transition:transform 0.45s ease,box-shadow 0.2s,top 0.2s;border-radius:8px;top:0;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card:hover .card-inner{top:-4px;box-shadow:0 8px 20px rgba(0,0,0,.13)}
.card:hover .card-front,.card:hover .card-back{background:var(--cat-bg,#fff);transition:background 0.2s}
.card.flipped .card-inner{transform:rotateY(180deg)}
.card-front,.card-back{position:absolute;width:100%;min-height:130px;box-sizing:border-box;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:8px;padding:10px 12px;border:1px solid #e8e8e8;background:#fff}
.card-back{transform:rotateY(180deg);background:#fafbff}

/* front face */
.cn{font-size:14px;font-weight:500;color:var(--cat-tc,#111);margin-bottom:2px}
.en{font-size:12px;color:#888;font-style:italic;margin-bottom:6px}
.note{font-size:12px;color:#666;line-height:1.5;border-top:1px solid #f0f0f0;padding-top:6px}
.flip-hint{font-size:10px;color:#bbb;text-align:right;margin-top:6px}

/* back face */
.bk-type{font-size:11px;font-weight:600;color:#555;background:#f0f0f0;border-radius:4px;padding:2px 7px;display:inline-block;margin-bottom:8px}
.bk-row{font-size:12px;line-height:1.55;margin-bottom:5px}
.bk-dose{color:#2a7a3b;font-weight:600}
.bk-side{color:#9a6c00;font-weight:600}
.bk-avoid{color:#b94040;font-weight:600}
.dose{font-size:12px;color:#2a7a3b;font-weight:600;line-height:1.5;margin-top:5px}

/* search */
.search-wrap{margin-bottom:1.5rem}
#search{width:100%;box-sizing:border-box;padding:9px 14px;font-size:14px;border:1px solid #ddd;border-radius:8px;outline:none;background:#fafafa}
#search:focus{border-color:#aaa;background:#fff}
mark{background:#fff176;border-radius:2px;padding:0 1px}

.disc{font-size:12px;color:#888;background:#f8f8f8;border-radius:8px;padding:10px 14px;margin-top:1.5rem;line-height:1.6}
.nav{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.5rem}
.nav-btn{font-size:13px;font-weight:500;padding:4px 12px;border-radius:6px;cursor:pointer;border:1px solid;transition:opacity 0.15s,transform 0.15s;text-decoration:none}
.nav-btn:hover{opacity:0.8;transform:translateY(-1px)}
</style>
</head>

  const btn=document.createElement('a');

  btn.textContent=cat.nav;
  btn.href='#';
  btn.style.cssText='background:'+cat.bg+';color:'+cat.tc+';border-color:'+cat.bc;
  btn.addEventListener('click',e=>{
    e.preventDefault();
    const target=document.getElementById('cat-'+i);
    if(target) target.scrollIntoView({behavior:'smooth',block:'start'});
  });
  nav.appendChild(btn);
});
DATA.forEach((cat,i)=>{
  const sec=document.createElement('div');
  sec.id='cat-'+i;
  const hdr=document.createElement('div');
  hdr.className='ch';
  const badge=document.createElement('span');
  badge.className='badge';
  badge.style.cssText='background:'+cat.bg+';color:'+cat.tc+';border:1px solid '+cat.bc;
  badge.textContent=cat.cat;
  const arr=document.createElement('span');
  arr.className='arr open';
  arr.textContent='▶';
  hdr.appendChild(badge);
  hdr.appendChild(arr);
  const grid=document.createElement('div');
  grid.className='grid';
  cat.drugs.forEach(d=>{
    const c=document.createElement('div');
    c.className='card';
    c.dataset.search=[d.n,d.e,d.r,d.t,d.d,d.s,d.i].join(' ').toLowerCase();
    c.style.setProperty('--cat-bg',cat.bg);
    c.style.setProperty('--cat-tc',cat.tc);
    c.innerHTML=
      '<div class="card-inner">'+
        '<div class="card-front">'+
          '<div class="cn">'+d.n+'</div>'+
          '<div class="en">'+d.e+'</div>'+
          '<div class="note">'+d.r+'</div>'+
          '<div class="dose">'+d.d+'</div>'+
        '</div>'+
        '<div class="card-back">'+
          '<span class="bk-type">'+d.t+'</span>'+
          '<div class="bk-row bk-side">'+d.s+'</div>'+
          '<div class="bk-row bk-avoid">'+d.i+'</div>'+
        '</div>'+
      '</div>';
    c.addEventListener('click',()=>c.classList.toggle('flipped'));
    grid.appendChild(c);
  });
  hdr.addEventListener('click',()=>{
    const open=grid.style.display!=='none';
    grid.style.display=open?'none':'grid';
    arr.classList.toggle('open',!open);
  });
  sec.appendChild(hdr);
  sec.appendChild(grid);
  app.appendChild(sec);
});

// equalise card heights within each grid after render
function equaliseHeights(){
  document.querySelectorAll('.grid').forEach(g=>{
    g.querySelectorAll('.card-inner,.card-front,.card-back').forEach(el=>el.style.minHeight='');
    let max=0;
    g.querySelectorAll('.card-front').forEach(el=>max=Math.max(max,el.scrollHeight));
    g.querySelectorAll('.card-back').forEach(el=>max=Math.max(max,el.scrollHeight));
    g.querySelectorAll('.card,.card-inner,.card-front,.card-back').forEach(el=>el.style.minHeight=max+'px');
  });
}
equaliseHeights();
window.addEventListener('resize',equaliseHeights);

document.getElementById('search').addEventListener('input',function(){
  const q=this.value.trim().toLowerCase();
  document.querySelectorAll('.grid').forEach(grid=>{
    let anyVisible=false;
    grid.querySelectorAll('.card').forEach(card=>{
      const match=!q||card.dataset.search.includes(q);
      card.classList.toggle('hidden',!match);
      if(match) anyVisible=true;
      // highlight front-face text
      card.querySelectorAll('.cn,.en,.note').forEach(el=>{
        el.innerHTML=el.textContent;
        if(q&&match){
          const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
          el.innerHTML=el.textContent.replace(re,'<mark>$1</mark>');
        }
      });
    });
    const sec=grid.parentElement;
    sec.style.display=anyVisible||!q?'':'none';
    if(q&&anyVisible) grid.style.display='grid';
  });
});
</script>
